<script>
/* boot guard: the in-browser Babel pipeline compiles 26 modules + CDN libs on
   every load; a transient hiccup leaves #root empty (black screen). Self-heal:
   poll for mount, auto-reload up to twice per session, then show a retry notice
   instead of a blank screen. */
(function () {
  var KEY = "keystone-boot-retry";
  function startWatch() {
    var tries = 0;
    var iv = setInterval(function () {
      var root = document.getElementById("root");
      if (root && root.children.length > 0) { clearInterval(iv); sessionStorage.removeItem(KEY); return; }
      if (++tries >= 16) { /* ~8s grace for slow compiles */
        clearInterval(iv);
        var n = +(sessionStorage.getItem(KEY) || 0);
        if (n < 2) { sessionStorage.setItem(KEY, n + 1); location.reload(); return; }
        if (root) root.innerHTML = '<div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;font:500 14px system-ui,sans-serif;color:#9aa0a6;background:#08090a">불러오는 중 문제가 발생했습니다.<button style="font:600 13px system-ui;color:#fff;background:#2a6fdb;border:0;border-radius:6px;padding:8px 16px;cursor:pointer" onclick="sessionStorage.removeItem(\'keystone-boot-retry\');location.reload()">다시 시도</button></div>';
      }
    }, 500);
  }
  if (document.readyState === "complete") { startWatch(); }
  else { window.addEventListener("load", startWatch); }
})();
</script>
